{{ define "main" }}
<div class="m2g-wrap">

  <section class="m2g-hero">
    <div class="m2g-eyebrow">Board Game</div>
    <h1 class="m2g-title">{{ .Title }}</h1>
    {{ with .Description }}
      <p class="m2g-subtitle">{{ . }}</p>
    {{ end }}
  </section>

    <div class="m2g-actions">
      <a class="m2g-button" href="https://buymeacoffee.com/gravitygame">Support</a>
    </div>

  <section class="m2g-section">
    <h2 class="m2g-section-title">Project Materials</h2>
    <div class="m2g-grid m2g-grid-3-small">
      {{ with .GetPage "rules.md" }}
      <div class="m2g-card">
        <h3>{{ .Title }}</h3>
        {{ with .Description }}<p>{{ . }}</p>{{ end }}
        <div class="m2g-card-links"><a href="{{ .RelPermalink }}">Open page</a></div>
      </div>
      {{ end }}
    </div>
  </section>

  <section class="m2g-section m2g-prose">
    {{ .Content }}
  </section>


  <section class="m2g-section">
    <div class="m2g-download-box">
      <div class="m2g-kicker">Downloads</div>
      <p>
        <a href="{{ "downloads/gladiators/gladiators-rules.pdf" | relURL }}">Rules (PDF)</a>
      </p>
    </div>
  </section>

</div>
{{ end }}
